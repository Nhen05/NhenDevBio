<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/jpeg"
        href="https://yt3.ggpht.com/m06x7RoejzojZ3c31uhT1U5FLhke99Ra8Inqw-l--WmM0L8zsws6WfDL1yyFTQx1NJD11-2r=s600-c-k-c0x00ffffff-no-rj-rp-mo">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./assets/css/tricks.css">
    <link rel="stylesheet" href="global.css">

    <style>
        /* ========== REDESIGN CARD YOUTUBE - MOBILE OPTIMIZED ========== */
        .yt-card {
            background-color: #1e2937;
            border-radius: 18px;
            padding: 14px 16px;
            border: 1px solid #334155;
            transition: all 0.2s ease;
            min-height: 118px;
            display: flex;
            flex-direction: column;
        }

        .yt-card:active {
            transform: scale(0.985);
            border-color: #475569;
        }

        .yt-avatar {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            border: 2px solid #475569;
            object-fit: cover;
            flex-shrink: 0;
        }

        .yt-name {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.35;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .yt-subs {
            font-size: 13px;
            font-weight: 600;
            color: #10b981;
        }

        .btn-watch {
            background-color: #ef4444;
            color: white;
            font-weight: 700;
            font-size: 14px;
            padding: 11px 0;
            border-radius: 14px;
            text-align: center;
            display: block;
            margin-top: auto;
            text-decoration: none;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
            margin-top: 10px;
        }

        .btn-watch:active {
            background-color: #dc2626;
            transform: scale(0.98);
        }

        .yt-info {
            flex: 1;
            min-width: 0;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <!-- HEADER (GIỮ NGUYÊN 100%) -->
    <div class="ava-wrap">
        <div class="ava-outer">
            <div class="ava-blur"></div>
            <div class="ava-ring"></div>
            <img class="ava-img"
                src="https://yt3.ggpht.com/m06x7RoejzojZ3c31uhT1U5FLhke99Ra8Inqw-l--WmM0L8zsws6WfDL1yyFTQx1NJD11-2r=s600-c-k-c0x00ffffff-no-rj-rp-mo">
            <div class="hex-badge">DEV</div>
        </div>
        <h1 class="name">NHEN DEVELOPER</h1>
        <p class="sub">Developer • Free Fire Tools • Mod & Portfolio</p>
        <div class="visitor">
            <i class="fas fa-circle"></i>
            <span id="visitorCount">Đang tải lượt truy cập...</span>
        </div>
    </div>

    <div class="back-button-container">
        <a href="index.html">
            <button class="btn-back"><i class="fas fa-arrow-left"></i> Quay lại</button>
        </a>
    </div>

    <h2 class="title-trick">TẤT CẢ KÊNH YOUTUBE</h2>

    <!-- GRID CARD -->
    <div class="max-w-[480px] mx-auto px-4 pb-12">
        <div class="grid grid-cols-2 gap-3">

            <!-- Card 1 -->
            <div id="ch1" class="yt-card">
                <div class="flex items-center gap-3">
                    <img class="yt-avatar" alt="">
                    <div class="yt-info">
                        <div class="yt-name">Đang tải...</div>
                        <div class="flex items-center gap-1.5">
                            <i class="fas fa-users text-emerald-500 text-xs"></i>
                            <span class="yt-subs">---</span>
                        </div>
                    </div>
                </div>
                <a href="https://youtube.com/@PauGamer-uh2zp" target="_blank" class="btn-watch">
                    <i class="fab fa-youtube mr-2"></i> XEM KÊNH
                </a>
            </div>

            <!-- Các card còn lại -->
            <div id="ch2" class="yt-card"></div>
            <div id="ch3" class="yt-card"></div>
            <div id="ch4" class="yt-card"></div>
            <div id="ch5" class="yt-card"></div>
            <div id="ch6" class="yt-card"></div>
            <div id="ch7" class="yt-card"></div>
            <div id="ch8" class="yt-card"></div>
            <div id="ch9" class="yt-card"></div>

        </div>
    </div>

    <!-- YOUTUBE API SCRIPT (GIỮ NGUYÊN) -->
    <script>
        const API_KEY = "AIzaSyCaRuBpmZHliL7vAGiO6PVMoXbEVlqyJ74";

        async function loadYouTubeChannel(username, cardId, link) {
            const card = document.getElementById(cardId);

            card.innerHTML = `
                <div class="flex items-center gap-3">
                    <img class="yt-avatar" alt="">
                    <div class="yt-info">
                        <div class="yt-name">Đang tải...</div>
                        <div class="flex items-center gap-1.5">
                            <i class="fas fa-users text-emerald-500 text-xs"></i>
                            <span class="yt-subs">...</span>
                        </div>
                    </div>
                </div>
                <a href="${link}" target="_blank" class="btn-watch">
                    <i class="fab fa-youtube mr-2"></i> XEM KÊNH
                </a>
            `;

            const res = await fetch(
                `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=@${username}&key=${API_KEY}`
            );
            const data = await res.json();
            if (!data.items || !data.items.length) return;

            const ch = data.items[0];

            card.querySelector("img").src = ch.snippet.thumbnails.high.url;
            card.querySelector(".yt-name").innerText = ch.snippet.title;
            card.querySelector(".yt-subs").innerText =
                Number(ch.statistics.subscriberCount).toLocaleString();
        }

        // Load tất cả kênh
        loadYouTubeChannel("PauGamer-uh2zp", "ch1", "https://youtube.com/@PauGamer-uh2zp");
        loadYouTubeChannel("NhenDevGame", "ch2", "https://youtube.com/@NhenDevGame");
        loadYouTubeChannel("HeadshotLabFF", "ch3", "https://youtube.com/@HeadshotLabFF");
        loadYouTubeChannel("NhenGamer", "ch4", "https://youtube.com/@NhenGamer");
        loadYouTubeChannel("NhenFF", "ch5", "https://youtube.com/@NhenFF");
        loadYouTubeChannel("NhenStoreGame", "ch6", "https://youtube.com/@NhenStoreGame");
        loadYouTubeChannel("CodeToKill", "ch7", "https://youtube.com/@CodeToKill");
        loadYouTubeChannel("pettoonsfun", "ch8", "https://youtube.com/@pettoonsfun");
        loadYouTubeChannel("nhenffno1", "ch9", "https://youtube.com/@nhenffno1");
    </script>

    <script src="./assets/js/Visit.js"></script>

    <script src="background.js"></script>
</body>
</html>
