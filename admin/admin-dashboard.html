<!-- ═══════════════════════════ JAVASCRIPT ═══════════════════════════════ -->
<script>
/* ─────────────── CONSTANTS ─────────────── */
const BASE = 'https://api.dak.edu.vn/game_store';
const LOCK_LIMIT = 10;
const LOCK_DURATION = 5 * 60 * 1000; // 5 phút

/* ─────────────── STATE ─────────────── */
let currentPage = 1;
let totalPages = 1;
let allFiles = [];
let filteredFiles = [];
let activeSection = 'dashboard';
let editingFileId = null;
let countdownInterval = null;
let sidebarOpen = false;

/* ══════════════════════════════════════════
   TOAST SYSTEM
══════════════════════════════════════════ */
function showToast(message, type = 'info', duration = 3500) {
  const icons = {
    success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `${icons[type] || ''}<span>${message}</span>`;
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideOut .3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/* ══════════════════════════════════════════
   SECURITY — LOGIN LOCK
══════════════════════════════════════════ */
function getFailedAttempts() { return parseInt(localStorage.getItem('failedAttempts') || '0'); }
function getLockUntil()      { return parseInt(localStorage.getItem('lockUntil') || '0'); }

function incrementFailed() {
  const n = getFailedAttempts() + 1;
  localStorage.setItem('failedAttempts', n);
  if (n >= LOCK_LIMIT) {
    const until = Date.now() + LOCK_DURATION;
    localStorage.setItem('lockUntil', until);
  }
  return n;
}

function resetFailed() {
  localStorage.removeItem('failedAttempts');
  localStorage.removeItem('lockUntil');
}

function isLocked() {
  const until = getLockUntil();
  if (!until) return false;
  if (Date.now() < until) return true;
  resetFailed();
  return false;
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  const total = getLockUntil() - Date.now();
  countdownInterval = setInterval(() => {
    const remaining = getLockUntil() - Date.now();
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      resetFailed();
      document.getElementById('lockBanner').style.display = 'none';
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('attemptsInfo').style.display = 'none';
      return;
    }
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    document.getElementById('countdown').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    const pct = Math.max(0, (remaining / total) * 100);
    document.getElementById('countdownFill').style.width = pct + '%';
  }, 500);
}

function checkLockOnLoad() {
  const failed = getFailedAttempts();
  if (isLocked()) {
    document.getElementById('lockBanner').style.display = 'block';
    document.getElementById('loginBtn').disabled = true;
    startCountdown();
  } else if (failed > 0 && failed < LOCK_LIMIT) {
    document.getElementById('attemptsInfo').style.display = 'block';
    document.getElementById('attemptsCount').textContent = failed;
  }
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
async function handleLogin() {
  if (isLocked()) return;
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  let valid = true;

  // clear old errors
  setInputError('emailInput', 'emailError', null);
  setInputError('passwordInput', 'passwordError', null);

  if (!email) { setInputError('emailInput', 'emailError', 'Vui lòng nhập email'); valid = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setInputError('emailInput', 'emailError', 'Email không hợp lệ'); valid = false; }
  if (!password) { setInputError('passwordInput', 'passwordError', 'Vui lòng nhập mật khẩu'); valid = false; }
  if (!valid) return;

  setLoginLoading(true);
  try {
    const res = await fetch(`${BASE}/index.php?action=login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (res.ok && (data.success || data.token || data.user || data.status === 'success')) {
      // SUCCESS
      resetFailed();
      const user = data.user || data.data || {};
      const token = btoa(`${email}:${Date.now()}`);
      localStorage.setItem('auth_token', token);
      localStorage.setItem('user_email', email);
      localStorage.setItem('user_id', user.id || user.user_id || '');
      showToast('Đăng nhập thành công!', 'success');
      setTimeout(() => initDashboard(), 600);
    } else {
      // FAIL
      const n = incrementFailed();
      const msg = data.message || data.error || 'Email hoặc mật khẩu không đúng';
      setInputError('passwordInput', 'passwordError', msg);
      showToast(msg, 'error');

      if (n >= LOCK_LIMIT) {
        document.getElementById('lockBanner').style.display = 'block';
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('attemptsInfo').style.display = 'none';
        startCountdown();
        showToast('Tài khoản bị khóa 5 phút do đăng nhập sai quá nhiều', 'error', 5000);
      } else {
        document.getElementById('attemptsInfo').style.display = 'block';
        document.getElementById('attemptsCount').textContent = n;
      }
    }
  } catch (err) {
    showToast('Lỗi kết nối. Vui lòng thử lại.', 'error');
  } finally {
    setLoginLoading(false);
  }
}

function setLoginLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const txt = document.getElementById('loginBtnText');
  btn.disabled = loading || isLocked();
  txt.innerHTML = loading
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;display:inline-block;"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Đang xử lý...'
    : 'Đăng nhập';
}

function setInputError(inputId, errorId, msg) {
  const inp = document.getElementById(inputId);
  const err = document.getElementById(errorId);
  if (msg) { inp.classList.add('error'); err.textContent = msg; err.style.display = 'block'; }
  else { inp.classList.remove('error'); err.style.display = 'none'; }
}

function togglePassword() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Enter to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') handleLogin();
});

/* ══════════════════════════════════════════
   AUTH CHECK / DASHBOARD INIT
══════════════════════════════════════════ */
function initApp() {
  checkLockOnLoad();
  const token = localStorage.getItem('auth_token');
  const email = localStorage.getItem('user_email');
  if (token && email) initDashboard();
}

function initDashboard() {
  const email = localStorage.getItem('user_email') || '';
  const initial = email.charAt(0).toUpperCase() || 'A';

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').classList.add('active');

  document.getElementById('avatarCircle').textContent = initial;
  document.getElementById('headerAvatar').textContent = initial;
  document.getElementById('sidebarEmail').textContent = email;
  document.getElementById('headerEmail').textContent = email;

  showSection('dashboard');
  checkMobileMenu();
}

function handleLogout() {
  localStorage.removeItem('auth_token');
  localStorage.removeItem('user_email');
  localStorage.removeItem('user_id');
  showToast('Đã đăng xuất', 'info');
  document.getElementById('dashboardPage').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('emailInput').value = '';
  document.getElementById('passwordInput').value = '';
}

/* ══════════════════════════════════════════
   SECTION NAVIGATION
══════════════════════════════════════════ */
function showSection(name) {
  activeSection = name;
  ['dashboard', 'files'].forEach(s => {
    document.getElementById(`section${capitalize(s)}`).style.display = 'none';
    document.getElementById(`nav${capitalize(s)}`).classList.remove('active');
  });
  document.getElementById(`section${capitalize(name)}`).style.display = 'block';
  document.getElementById(`nav${capitalize(name)}`).classList.add('active');

  const titles = { dashboard: ['Dashboard', 'Tổng quan hệ thống'], files: ['Quản lý File', 'Danh sách tài nguyên'] };
  document.getElementById('pageTitle').textContent = titles[name][0];
  document.getElementById('pageSubtitle').textContent = titles[name][1];

  if (name === 'dashboard') fetchStats();
  if (name === 'files') { currentPage = 1; fetchFiles(); }

  // close sidebar on mobile after navigation
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    sidebarOpen = false;
  }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
async function fetchStats() {
  document.getElementById('statsGrid').innerHTML = `
    <div class="skeleton" style="height:130px;border-radius:18px;"></div>
    <div class="skeleton" style="height:130px;border-radius:18px;"></div>
    <div class="skeleton" style="height:130px;border-radius:18px;"></div>`;
  try {
    const res = await fetch(`${BASE}/visit.php?action=stats`);
    const data = await res.json();
    const stats = data.data || data;
    renderStats(stats);
  } catch {
    showToast('Không thể tải thống kê', 'error');
    renderStats({});
  }
}

function renderStats(stats) {
  const cards = [
    { label: 'Tổng lượt truy cập', value: stats.total_views || 0, icon: '<path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>', color: '#818cf8', bg: 'rgba(99,102,241,0.12)' },
    { label: 'Người dùng unique', value: stats.unique_users || 0, icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', color: '#34d399', bg: 'rgba(16,185,129,0.12)' },
    { label: 'Truy cập hôm nay',  value: stats.today_users || 0, icon: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', color: '#fbbf24', bg: 'rgba(245,158,11,0.12)' },
  ];

  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
        <div style="width:44px;height:44px;background:${c.bg};border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="2">${c.icon}</svg>
        </div>
        <span style="font-size:11px;font-weight:600;color:#475569;background:rgba(255,255,255,0.04);padding:4px 10px;border-radius:20px;border:1px solid var(--border);">LIVE</span>
      </div>
      <div class="count-up" style="color:${c.color};" data-target="${c.value}">0</div>
      <p style="font-size:13px;color:#64748b;margin:6px 0 0;">${c.label}</p>
    </div>`).join('');

  document.querySelectorAll('.count-up').forEach(el => {
    const target = parseInt(el.dataset.target);
    animateCount(el, target);
  });
}

function animateCount(el, target) {
  const duration = 1200;
  const start = performance.now();
  const frame = now => {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(ease * target).toLocaleString('vi-VN');
    if (progress < 1) requestAnimationFrame(frame);
  };
  requestAnimationFrame(frame);
}

/* ══════════════════════════════════════════
   FILES
══════════════════════════════════════════ */
async function fetchFiles() {
  document.getElementById('fileGrid').innerHTML = Array(6).fill(`<div class="skeleton" style="height:280px;border-radius:16px;"></div>`).join('');
  document.getElementById('paginationContainer').innerHTML = '';
  try {
    const res = await fetch(`${BASE}/index.php?action=get_files&page=${currentPage}`);
    const data = await res.json();
    allFiles = data.data || data.files || data || [];
    totalPages = data.total_pages || data.pages || Math.ceil((data.total || allFiles.length) / 12) || 1;
    populateCategoryFilter();
    applyFilters();
  } catch {
    showToast('Không thể tải danh sách file', 'error');
    document.getElementById('fileGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#475569;padding:60px 20px;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>Không thể tải dữ liệu</p></div>`;
  }
}

function populateCategoryFilter() {
  const cats = [...new Set(allFiles.map(f => f.category).filter(Boolean))];
  const sel = document.getElementById('filterCategory');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tất cả danh mục</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = cur;
}

function applyFilters() {
  const cat = document.getElementById('filterCategory').value;
  filteredFiles = cat ? allFiles.filter(f => f.category === cat) : [...allFiles];
  renderFileGrid(filteredFiles);
  renderPagination();
}

function renderFileGrid(files) {
  if (!files.length) {
    document.getElementById('fileGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#475569;padding:60px 20px;">Không có file nào</div>`;
    return;
  }
  document.getElementById('fileGrid').innerHTML = files.map(f => {
    const type = (f.type || f.file_type || 'FREE').toUpperCase();
    const badgeCls = type === 'VIP' ? 'badge-vip' : type === 'PREMIUM' ? 'badge-premium' : type === 'FREE' ? 'badge-free' : 'badge-default';
    const img = f.image || f.thumbnail || f.img || '';
    return `<div class="file-card">
      <div style="position:relative;height:140px;background:#0a0f1e;overflow:hidden;">
        ${img ? `<img src="${img}" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.85;" onerror="this.style.display='none'">` : ''}
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(8,11,20,.9),transparent 60%);"></div>
        <div style="position:absolute;top:12px;right:12px;"><span class="badge ${badgeCls}">${type}</span></div>
        <div style="position:absolute;bottom:10px;left:12px;font-size:11px;color:#64748b;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:3px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Stock: ${f.stock || 0}
        </div>
      </div>
      <div style="padding:14px;">
        <h4 style="font-size:14px;font-weight:600;color:#f1f5f9;margin:0 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.title || f.name || 'Untitled'}</h4>
        <p style="font-size:12px;color:#64748b;margin:0 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;">${f.description || f.desc || ''}</p>
        ${f.category ? `<div style="font-size:11px;color:#7c3aed;background:rgba(124,58,237,0.1);border-radius:6px;padding:2px 8px;display:inline-block;margin-bottom:12px;">${f.category}</div>` : ''}
        <div style="display:flex;gap:8px;">
          <button onclick="openEditModal(${JSON.stringify(f).replace(/"/g,'&quot;')})" style="flex:1;padding:8px;border-radius:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#818cf8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:3px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Sửa
          </button>
          <button onclick="confirmDelete(${f.id || f.file_id || 0}, '${(f.title||f.name||'').replace(/'/g,"\\'")}' )" style="flex:1;padding:8px;border-radius:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:3px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>Xóa
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderPagination() {
  const c = document.getElementById('paginationContainer');
  if (totalPages <= 1) { c.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Trước</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1)
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - currentPage) === 2)
      html += `<span style="color:#475569;padding:0 4px;">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Sau ›</button>`;
  c.innerHTML = html;
}

async function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  await fetchFiles();
}

/* ══════════════════════════════════════════
   DELETE
══════════════════════════════════════════ */
let pendingDeleteId = null;

function confirmDelete(id, title) {
  pendingDeleteId = id;
  document.getElementById('confirmText').textContent = `Bạn có chắc chắn muốn xóa "${title}"?`;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmDeleteBtn').onclick = executeDelete;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('open');
  pendingDeleteId = null;
}

async function executeDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true; btn.textContent = 'Đang xóa...';
  try {
    const res = await fetch(`${BASE}/index.php?action=delete_file`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: pendingDeleteId }),
    });
    const data = await res.json();
    if (res.ok && (data.success || data.status === 'success')) {
      showToast('Xóa file thành công!', 'success');
      closeConfirmModal();
      fetchFiles();
    } else {
      showToast(data.message || 'Xóa thất bại', 'error');
    }
  } catch {
    showToast('Lỗi kết nối', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Xóa';
  }
}

/* ══════════════════════════════════════════
   CREATE / EDIT MODAL
══════════════════════════════════════════ */
function openCreateModal() {
  editingFileId = null;
  document.getElementById('fileModalTitle').textContent = 'Tạo file mới';
  document.getElementById('fileModalSaveTxt').textContent = 'Tạo file';
  ['fTitle','fDesc','fCategory','fStock','fImage','fUrl'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fType').value = 'FREE';
  document.getElementById('fileModal').classList.add('open');
}

function openEditModal(file) {
  editingFileId = file.id || file.file_id;
  document.getElementById('fileModalTitle').textContent = 'Chỉnh sửa file';
  document.getElementById('fileModalSaveTxt').textContent = 'Lưu thay đổi';
  document.getElementById('fTitle').value = file.title || file.name || '';
  document.getElementById('fDesc').value = file.description || file.desc || '';
  document.getElementById('fCategory').value = file.category || '';
  document.getElementById('fType').value = (file.type || file.file_type || 'FREE').toUpperCase();
  document.getElementById('fStock').value = file.stock || 0;
  document.getElementById('fImage').value = file.image || file.thumbnail || '';
  document.getElementById('fUrl').value = file.url || file.file_url || '';
  document.getElementById('fileModal').classList.add('open');
}

function closeFileModal() {
  document.getElementById('fileModal').classList.remove('open');
  editingFileId = null;
}

async function saveFile() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Vui lòng nhập tiêu đề', 'error'); return; }

  const payload = {
    title,
    description: document.getElementById('fDesc').value.trim(),
    category: document.getElementById('fCategory').value.trim(),
    type: document.getElementById('fType').value,
    stock: parseInt(document.getElementById('fStock').value) || 0,
    image: document.getElementById('fImage').value.trim(),
    url: document.getElementById('fUrl').value.trim(),
  };

  if (editingFileId) payload.id = editingFileId;

  const action = editingFileId ? 'update_file' : 'create_file';
  const btn = document.getElementById('fileModalSaveBtn');
  const txt = document.getElementById('fileModalSaveTxt');
  btn.disabled = true; txt.textContent = 'Đang lưu...';

  try {
    const res = await fetch(`${BASE}/index.php?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok && (data.success || data.status === 'success')) {
      showToast(editingFileId ? 'Cập nhật thành công!' : 'Tạo file thành công!', 'success');
      closeFileModal();
      fetchFiles();
    } else {
      showToast(data.message || 'Thao tác thất bại', 'error');
    }
  } catch {
    showToast('Lỗi kết nối', 'error');
  } finally {
    btn.disabled = false;
    txt.textContent = editingFileId ? 'Lưu thay đổi' : 'Tạo file';
  }
}

/* ══════════════════════════════════════════
   RESPONSIVE SIDEBAR
══════════════════════════════════════════ */
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
}

function checkMobileMenu() {
  const toggle = document.getElementById('menuToggle');
  toggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
}

window.addEventListener('resize', checkMobileMenu);

// close sidebar on backdrop click (mobile)
document.getElementById('dashboardPage').addEventListener('click', e => {
  if (window.innerWidth <= 768 && sidebarOpen) {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar.contains(e.target) && !document.getElementById('menuToggle').contains(e.target)) {
      sidebar.classList.remove('open');
      sidebarOpen = false;
    }
  }
});

// close modals on backdrop click
document.getElementById('confirmModal').addEventListener('click', e => { if (e.target === document.getElementById('confirmModal')) closeConfirmModal(); });
document.getElementById('fileModal').addEventListener('click', e => { if (e.target === document.getElementById('fileModal')) closeFileModal(); });

/* ══════════════════════════════════════════
   SPIN KEYFRAME (for loading spinner)
══════════════════════════════════════════ */
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
initApp();
</script>
